global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cotton-net'

scrape_configs:

  # Coordinators — métricas da API FastAPI (latência, throughput, fila, NYMs)
  - job_name: 'coordinators'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - '10.10.20.151:8001'
          - '10.10.20.152:8002'
          - '10.10.20.153:8003'
          - '10.10.20.154:8004'
        labels: {service: 'coordinator'}

  # node-exporter — métricas do host (disco, rede, CPU, memória física)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['10.10.20.151:9100']
        labels: {node: 'flores', supernodo: 'S1'}
      - targets: ['10.10.20.152:9100']
        labels: {node: 'corisco', supernodo: 'S2'}
      - targets: ['10.10.20.153:9100']
        labels: {node: 'baiacu', supernodo: 'S3'}
      - targets: ['10.10.20.154:9100']
        labels: {node: 'pernambuco', supernodo: 'S4'}
      - targets: ['10.10.20.155:9100']
        labels: {node: 'cacao', supernodo: 'monitoring'}

  # Indy Validator Exporter — métricas internas dos nós RBFT
  - job_name: 'indy-exporter'
    static_configs:
      - targets: ['10.10.20.155:9309']
        labels: {service: 'indy-exporter'}

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
